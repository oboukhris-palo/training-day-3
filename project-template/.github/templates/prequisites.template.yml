# AI Readiness Prerequisites - Enterprise Template

## Assessment Metadata

assessment:
  projectName: "{{ PROJECT_NAME }}"
  organizationName: "{{ ORGANIZATION_NAME }}"
  assessmentId: "{{ ASSESSMENT_ID }}"
  assessmentDate: "{{ ASSESSMENT_DATE }}"
  assessmentEndDate: "{{ ASSESSMENT_END_DATE }}"
  assessmentTeam:
    - name: "{{ TEAM_MEMBER_1_NAME }}"
      role: "{{ TEAM_MEMBER_1_ROLE }}"
      email: "{{ TEAM_MEMBER_1_EMAIL }}"
    - name: "{{ TEAM_MEMBER_2_NAME }}"
      role: "{{ TEAM_MEMBER_2_ROLE }}"
      email: "{{ TEAM_MEMBER_2_EMAIL }}"
  
  # Primary stakeholder contact
  primaryStakeholder:
    name: "{{ STAKEHOLDER_NAME }}"
    role: "{{ STAKEHOLDER_ROLE }}"
    email: "{{ STAKEHOLDER_EMAIL }}"
    phone: "{{ STAKEHOLDER_PHONE }}"
    timezone: "{{ STAKEHOLDER_TIMEZONE }}"
  
  # Secondary approver (if applicable)
  approver:
    name: "{{ APPROVER_NAME }}"
    role: "{{ APPROVER_ROLE }}"
    email: "{{ APPROVER_EMAIL }}"
  
  # Target completion
  targetCompletionDate: "{{ TARGET_DATE }}"
  competencyLevel: "{{ ENTERPRISE | ADVANCED | STANDARD }}"

---

## Executive Summary

summary:
  # Overall readiness score
  readinessScore:
    current: "{{ X }}%"
    target: "90%"
    assessment: "{{ ASSESSMENT_TEXT }}"
  
  # Strategic recommendation
  recommendation: "{{ RECOMMENDATION_TEXT }}"
  
  # Key blockers (if any)
  blockers: []
    # - blockerId: "BLK-001"
    #   item: "System"
    #   reason: "Access denied"
    #   severity: "HIGH"
    #   owner: "{{ OWNER }}"
    #   resolutionDate: "{{ DATE }}"
  
  # Risk assessment
  riskAssessment:
    level: "{{ LOW | MEDIUM | HIGH | CRITICAL }}"
    description: "{{ RISK_DESCRIPTION }}"
    mitigationStrategy: "{{ MITIGATION_STRATEGY }}"

---

## Prerequisites Configuration

### 1. Documentation Systems (30% Readiness Weight)

documentation:
  
  # Confluence
  confluence:
    enabled: {{ true | false }}
    system: "Confluence"
    accessLevel: "READ"
    rationale: "Retrieve Architecture Decision Records (ADRs), API specifications, design documentation"
    
    spaces:
      - spaceKey: "{{ SPACE_KEY_1 }}"
        spaceName: "{{ SPACE_NAME_1 }}"
        purpose: "{{ PURPOSE }}"
        accessLevel: "READ"
        requestStatus: "{{ REQUESTED | GRANTED | DENIED | NOT_APPLICABLE }}"
        grantedDate: "{{ DATE }}"
        grantedBy: "{{ PERSON }}"
        notes: "{{ NOTES }}"
      
      - spaceKey: "{{ SPACE_KEY_2 }}"
        spaceName: "{{ SPACE_NAME_2 }}"
        purpose: "{{ PURPOSE }}"
        accessLevel: "READ"
        requestStatus: "{{ REQUESTED | GRANTED | DENIED | NOT_APPLICABLE }}"
    
    documentation:
      - name: "Architecture Decision Records"
        location: "{{ CONFLUENCE_SPACE }}/ADRs"
        criticality: "HIGH"
      - name: "API Specifications"
        location: "{{ CONFLUENCE_SPACE }}/API-Specs"
        criticality: "HIGH"
      - name: "Design Documentation"
        location: "{{ CONFLUENCE_SPACE }}/Design"
        criticality: "MEDIUM"
  
  # Alternative documentation systems
  alternativeDocSystems: []
    # - system: "GitBook"
    #   url: "{{ URL }}"
    #   accessLevel: "READ"
    #   requestStatus: "REQUESTED"
    #   purposeDescription: "Technical specifications and design patterns"
    # - system: "SharePoint"
    #   url: "{{ URL }}"
    #   accessLevel: "READ"
    #   requestStatus: "GRANTED"
    #   grantedDate: "{{ DATE }}"

---

### 2. Issue Tracking & Requirements (20% Readiness Weight)

issueTracking:
  
  # Jira
  jira:
    enabled: {{ true | false }}
    system: "Jira"
    accessLevel: "READ"
    rationale: "Track requirements, user stories, acceptance criteria, and implementation progress"
    
    projects:
      - projectKey: "{{ PROJECT_KEY_1 }}"
        projectName: "{{ PROJECT_NAME_1 }}"
        accessLevel: "READ"
        issueTypes:
          - "Epic"
          - "Story"
          - "Task"
          - "Bug"
        requestStatus: "{{ REQUESTED | GRANTED | DENIED | NOT_APPLICABLE }}"
        grantedDate: "{{ DATE }}"
        grantedBy: "{{ PERSON }}"
        notes: "{{ NOTES }}"
      
      - projectKey: "{{ PROJECT_KEY_2 }}"
        projectName: "{{ PROJECT_NAME_2 }}"
        accessLevel: "READ"
        requestStatus: "{{ REQUESTED | GRANTED | DENIED | NOT_APPLICABLE }}"
    
    useCase:
      - "Extract business requirements and acceptance criteria"
      - "Link code commits to story references"
      - "Validate implementation against story requirements"
      - "Track sprint progress and blockers"
  
  # Azure DevOps
  azureDevOps:
    enabled: {{ true | false }}
    system: "Azure DevOps"
    accessLevel: "READ_API"
    apiType: "PAT"
    rationale: "Programmatic access to work items, repos, and CI/CD pipelines"
    
    projects:
      - projectName: "{{ ADO_PROJECT_1 }}"
        projectId: "{{ PROJECT_ID }}"
        accessLevel: "READ_API"
        requestStatus: "{{ REQUESTED | GRANTED | DENIED | NOT_APPLICABLE }}"
        patCreatedDate: "{{ DATE }}"
        patExpireDate: "{{ DATE }}"
    
    patManagement:
      rotationSchedule: "90 days"
      nextRotationDate: "{{ DATE }}"
      scope: "minimal"
      allowedOperations:
        - "read:work_items"
        - "read:code_repository"
        - "read:build_pipeline"
  
  # GitHub Issues / GitLab Issues
  alternativeIssueTracking: []
    # - system: "GitHub Issues"
    #   project: "{{ REPO_NAME }}"
    #   accessLevel: "READ"
    #   requestStatus: "GRANTED"
    # - system: "GitLab Issues"
    #   project: "{{ PROJECT_NAME }}"
    #   accessLevel: "READ"
    #   requestStatus: "REQUESTED"

---

### 3. Architecture & Design Artifacts (15% Readiness Weight)

architecture:
  
  # Miro
  miro:
    enabled: {{ true | false }}
    system: "Miro"
    accessLevel: "VIEWER"
    rationale: "Consult visual architecture documentation, C4 models, data flows, and design patterns"
    
    team:
      teamName: "{{ MIRO_TEAM_NAME }}"
      requestStatus: "{{ REQUESTED | GRANTED | DENIED | NOT_APPLICABLE }}"
      accessLevel: "VIEWER"
      grantedDate: "{{ DATE }}"
    
    boards:
      - boardId: "{{ BOARD_ID_1 }}"
        boardName: "{{ BOARD_NAME_1 }}"
        purpose: "System Architecture & C4 Models"
        criticality: "HIGH"
        accessLevel: "VIEWER"
      
      - boardId: "{{ BOARD_ID_2 }}"
        boardName: "{{ BOARD_NAME_2 }}"
        purpose: "Data Flow Diagrams & Integration Patterns"
        criticality: "MEDIUM"
        accessLevel: "VIEWER"
      
      - boardId: "{{ BOARD_ID_3 }}"
        boardName: "{{ BOARD_NAME_3 }}"
        purpose: "Product Roadmap & Release Planning"
        criticality: "MEDIUM"
        accessLevel: "VIEWER"
  
  # Figma
  figma:
    enabled: {{ true | false }}
    system: "Figma"
    accessLevel: "VIEW"
    rationale: "Reference UI/UX designs and design system specifications"
    
    team:
      teamName: "{{ FIGMA_TEAM_NAME }}"
      requestStatus: "{{ REQUESTED | GRANTED | DENIED | NOT_APPLICABLE }}"
      accessLevel: "VIEW"
      grantedDate: "{{ DATE }}"
    
    projects:
      - projectName: "{{ FIGMA_PROJECT_1 }}"
        purpose: "Design System & Component Library"
        criticality: "MEDIUM"
        accessLevel: "VIEW"
      
      - projectName: "{{ FIGMA_PROJECT_2 }}"
        purpose: "Product UI Mockups & Prototypes"
        criticality: "MEDIUM"
        accessLevel: "VIEW"
  
  # Lucidchart / PlantUML
  alternativeArchitecture: []
    # - system: "Lucidchart"
    #   team: "{{ TEAM_NAME }}"
    #   accessLevel: "VIEW"
    #   requestStatus: "GRANTED"

---

### 4. Code Repository & CI/CD (25% Readiness Weight)

codeRepository:
  
  # GitHub
  github:
    enabled: {{ true | false }}
    system: "GitHub"
    accessLevel: "READ"
    rationale: "Analyze codebase structure, review commits, validate CI/CD workflows"
    
    repositories:
      - repoName: "{{ REPO_NAME_1 }}"
        repoUrl: "{{ REPO_URL }}"
        accessLevel: "READ"
        requestStatus: "{{ REQUESTED | GRANTED | DENIED | NOT_APPLICABLE }}"
        grantedDate: "{{ DATE }}"
        scope:
          - "Commits"
          - "Pull Requests"
          - "Workflows"
          - "Release Notes"
      
      - repoName: "{{ REPO_NAME_2 }}"
        repoUrl: "{{ REPO_URL }}"
        accessLevel: "READ"
        requestStatus: "{{ REQUESTED | GRANTED | DENIED | NOT_APPLICABLE }}"
    
    cicdPlatform: "GitHub Actions"
    workflowInspection: "Validate deployment pipelines and test automation"
  
  # GitLab
  gitlab:
    enabled: {{ true | false }}
    system: "GitLab"
    accessLevel: "GUEST"
    rationale: "Repository access and pipeline analysis"
    
    projects:
      - projectName: "{{ PROJECT_NAME_1 }}"
        projectId: "{{ PROJECT_ID }}"
        accessLevel: "GUEST"
        requestStatus: "{{ REQUESTED | GRANTED | DENIED | NOT_APPLICABLE }}"
    
    cicdPlatform: "GitLab CI/CD"
  
  # Azure DevOps Repositories
  azureDevOpsRepo:
    enabled: {{ true | false }}
    system: "Azure DevOps Repository"
    accessLevel: "READ_API"
    patRequired: true
    rationale: "Programmatic code access and CI/CD pipeline analysis"
    
    repositories:
      - repoName: "{{ REPO_NAME }}"
        projectName: "{{ PROJECT_NAME }}"
        accessLevel: "READ_API"
        requestStatus: "{{ REQUESTED | GRANTED | DENIED | NOT_APPLICABLE }}"
    
    cicdPlatform: "Azure Pipelines"
    patManagement:
      scope: "Code (read)"
      rotationSchedule: "90 days"

---

### 5. API & Integration Layer (10% Readiness Weight)

apiLayer:
  
  # OpenAPI / Swagger Registry
  apiRegistry:
    enabled: {{ true | false }}
    system: "{{ API_REGISTRY_SYSTEM }}"
    examples:
      - "Swagger Hub"
      - "Internal Registry"
      - "API Portal"
      - "Stoplight"
    
    location: "{{ REGISTRY_URL }}"
    accessLevel: "READ"
    requestStatus: "{{ REQUESTED | GRANTED | DENIED | NOT_APPLICABLE }}"
    grantedDate: "{{ DATE }}"
    
    purpose:
      - "Extract API contracts and interface specifications"
      - "Analyze integration patterns and data models"
      - "Validate API versioning and deprecation policies"
    
    documentation:
      - apiName: "{{ API_NAME_1 }}"
        apiVersion: "{{ VERSION }}"
        format: "OpenAPI 3.0"
        criticality: "HIGH"
      
      - apiName: "{{ API_NAME_2 }}"
        apiVersion: "{{ VERSION }}"
        format: "OpenAPI 3.0"
        criticality: "MEDIUM"
  
  # GraphQL Schema Registry
  graphqlRegistry:
    enabled: {{ true | false }}
    system: "GraphQL Schema Registry"
    location: "{{ REGISTRY_URL }}"
    accessLevel: "READ"
    requestStatus: "{{ REQUESTED | GRANTED | DENIED | NOT_APPLICABLE }}"
  
  # gRPC Service Definitions
  grpcServices:
    enabled: {{ true | false }}
    system: "gRPC Service Repository"
    location: "{{ REPOSITORY_LOCATION }}"
    accessLevel: "READ"
    requestStatus: "{{ REQUESTED | GRANTED | DENIED | NOT_APPLICABLE }}"

---

## Security & Compliance Framework

security:
  
  # PAT Management
  personalAccessTokens:
    rotationPolicy: "Mandatory 90-day rotation"
    firstRotation: "{{ DATE }}"
    nextScheduledRotation: "{{ DATE }}"
    
    storageSecurity:
      - "Tokens stored in isolated environment (not shared)"
      - "Tokens never logged or printed"
      - "Tokens revoked immediately after project completion"
    
    scope: "Minimum necessary privileges"
    allowedScopes:
      - read:documentation
      - read:code_repository
      - read:issues
      - read:ci_cd_pipeline
    
    prohibitedScopes:
      - write:code
      - delete:any
      - admin:organization
  
  # Data Governance
  dataGovernance:
    dataClassification: "{{ PUBLIC | INTERNAL | CONFIDENTIAL | RESTRICTED }}"
    retentionPolicy: "{{ RETENTION_PERIOD }}"
    
    complianceFrameworks:
      - "{{ FRAMEWORK_1 }}"
      - "{{ FRAMEWORK_2 }}"
      - "{{ FRAMEWORK_3 }}"
    
    certifications:
      - name: "SOC2 Type II"
        compliant: {{ true | false }}
      - name: "GDPR"
        compliant: {{ true | false }}
      - name: "HIPAA"
        compliant: {{ true | false }}
      - name: "ISO 27001"
        compliant: {{ true | false }}
  
  # Access Control & Audit
  accessControl:
    auditingEnabled: true
    auditFrequency: "Real-time"
    
    accessRules:
      - "All access is READ-ONLY unless otherwise justified"
      - "API tokens use time-limited credentials"
      - "Access is role-based and least-privileged"
      - "Regular access reviews every 90 days"
    
    complianceOfficer:
      name: "{{ COMPLIANCE_OFFICER_NAME }}"
      email: "{{ COMPLIANCE_OFFICER_EMAIL }}"
      role: "{{ ROLE }}"

---


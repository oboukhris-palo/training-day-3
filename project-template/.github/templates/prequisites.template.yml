## Blockers & Escalation Management

escalation:
  
  # Active blockers
  blockers:
    - blockerId: "BLK-001"
      prerequisiteId: "PRE-003"
      system: "GitHub"
      item: "Private repository access"
      blockReason: "Security authorization pending"
      blockSeverity: "HIGH"
      currentOwner:
        name: "{{ OWNER_NAME }}"
        role: "{{ OWNER_ROLE }}"
        email: "{{ OWNER_EMAIL }}"
      createdDate: "{{ DATE }}"
      targetResolutionDate: "{{ DATE }}"
      escalationPath:

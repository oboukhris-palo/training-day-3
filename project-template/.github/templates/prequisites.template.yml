## Best Practices & Guidance

bestPractices:
  
  # Assessment discovery checklist
  discoveryChecklist:
    step1_DiscoverSystems:
      description: "Identify which systems exist in the organization"
      checklist:
        - "[ ] Team uses Confluence or equivalent? → YES/NO → {{SYSTEM_NAME}}"
        - "[ ] Team uses Jira or equivalent? → YES/NO → {{SYSTEM_NAME}}"
        - "[ ] Team uses Miro/Figma for architecture? → YES/NO → {{SYSTEM_NAME}}"
        - "[ ] Repository is GitHub/GitLab/ADO? → YES/NO → {{SYSTEM_NAME}}"
        - "[ ] OpenAPI specs documented? → YES/NO → {{LOCATION}}"
        - "[ ] Compliance requirements exist? → YES/NO → {{FRAMEWORKS}}"
    
    step2_BuildSystemTable:
      description: "Map each discovered system with requirements"
      template:
        - system: "Confluence"
          exists: "YES"
          alreadyUsing: "YES"
          accessNeeded: "READ"
          priority: "HIGH"
        - system: "Jira"
          exists: "YES"
          alreadyUsing: "YES"
          accessNeeded: "READ"
          priority: "HIGH"
        - system: "GitHub"
          exists: "YES"
          alreadyUsing: "YES"
          accessNeeded: "READ"
          priority: "HIGH"
    
    step3_WriteRequest:
      guidance:
        - "Include only systems that exist"
        - "Adjust access levels based on sensitivity"
        - "Reference specific spaces/projects (not vague)"
        - "Emphasize read-only and minimum scope"
    
    step4_TrackAndClose:
      guidance:
        - "Update checklist as access is granted"
        - "Update team when fully ready"
        - "Don't assume approval; follow up consistently"

  # Pro tips
  proTips:
    - tip: "Always lead with security"
      guidance: "Emphasize 'Read-only,' 'minimum scope,' '90-day rotation' in every request"
    
    - tip: "Be specific with scope"
      guidance: "List exact projects/spaces/teams (e.g., 'MERCHANT space', 'merchant-api repo'), not vague 'project access'"
    
    - tip: "Explain the 'why'"
      guidance: "Connect each access request to concrete benefits (e.g., 'Retrieve ADRs' not just 'Confluence access')"
    
    - tip: "Separate concerns"
      guidance: "Don't lump together: Documentation access ≠ Code repo access ≠ CI/CD access; each needs justification"
    
    - tip: "Document compliance early"
      guidance: "Show respect for data governance policies; builds trust with security teams"
    
    - tip: "Follow up systematically"
      guidance: "Don't assume approval; track each prerequisite and follow up regularly"

  # Common gotchas to avoid
  commonGotchas:
    - gotcha: "Requesting write access"
      avoid: "Always justify in writing; default should be read-only"
      example: "❌ 'I need write access to GitHub' → ✅ 'I need read access for code analysis'"
    
    - gotcha: "Vague scope without specificity"
      avoid: "'Jira access' is ambiguous; specify exact projects and issue types"
      example: "❌ 'Jira access' → ✅ 'MERCHANT project, read access to Epics/Stories/Acceptance Criteria'"
    
    - gotcha: "Missing PAT (Personal Access Token) details"
      avoid: "Always explain rotation schedule, scope, and secure storage procedures"
      example: "❌ 'Need GitHub PAT' → ✅ 'GitHub PAT (read:code + read:workflows), 90-day rotation, stored in secure vault'"
    
    - gotcha: "Forgetting API access for code repositories"
      avoid: "If you need programmatic repo access, always mention PAT requirements"
      example: "Code analysis requires: both UI access AND API token for automated scanning"
    
    - gotcha: "Skipping compliance mentions"
      avoid: "Always reference applicable compliance frameworks (GDPR, SOC2, etc.)"
      example: "All tokens use minimum necessary scope per {{COMPLIANCE_FRAMEWORK}} requirements"

  # Usage scenarios by project type
  examplesByProjectType:
    
    - projectType: "SaaS API Project"
      description: "Cloud-hosted API service with web UI, typical startup/scale-up structure"
      prerequisites:
        - "OpenAPI / Swagger Hub"
        - "GitHub repository"
        - "Jira (feature tracking)"
        - "Confluence (API design docs)"
        - "GitHub Actions (CI/CD)"
      timelineEstimate: "5-7 business days"
      complexityLevel: "MEDIUM"
    
    - projectType: "Enterprise Monorepo"
      description: "Large organization with centralized codebase, enterprise tools"
      prerequisites:
        - "Azure DevOps (repo + issue tracking + CI/CD) OR"
        - "Confluence or SharePoint (tech specs)"
        - "Miro (architecture C4 models)"
        - "Jira or ADO Work Items"
      timelineEstimate: "10-15 business days"
      complexityLevel: "HIGH"
      specialConsiderations:
        - "Multiple approval layers likely"
        - "Compliance review required"
        - "Security assessment needed"
    
    - projectType: "Microservices Architecture"
      description: "Distributed system with multiple repositories and services"
      prerequisites:
        - "Multiple GitHub/GitLab repos"
        - "API registry (OpenAPI, gRPC specs)"
        - "Architecture documentation (Miro, Lucidchart)"
        - "Jira + Confluence (requirements + design)"
        - "CI/CD platform (GitHub Actions / GitLab CI / Azure Pipelines)"
      timelineEstimate: "7-10 business days"
      complexityLevel: "HIGH"
      specialConsiderations:
        - "Cross-team coordination needed"
        - "Service ownership mapping required"
    
    - projectType: "Regulated Industry (FinTech, Healthcare, Government)"
      description: "Compliance-heavy environment with strict data governance"
      prerequisites:
        - "All prerequisites from other project types"
        - "Security & compliance documentation access"
        - "Data governance policies review"
        - "Audit trail requirements verification"
        - "PAT rotation & secret management policy"
      timelineEstimate: "15-20 business days"
      complexityLevel: "CRITICAL"
      specialConsiderations:
        - "Compliance officer sign-off mandatory"
        - "Data classification review"
        - "Regular access audits (quarterly minimum)"
        - "Incident response procedures"

  # Format selection guide
  formatSelectionGuide:
    
    - format: "Format A (Email)"
      when:
        - "Formal stakeholder engagement required"

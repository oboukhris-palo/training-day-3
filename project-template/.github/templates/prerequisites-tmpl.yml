## Best Practices & Guidance

bestPractices:
  
  # Assessment discovery checklist
  discoveryChecklist:
    step1_DiscoverSystems:
      description: "Identify which systems exist in the organization"
      checklist:
        - "[ ] Team uses Confluence or equivalent? → YES/NO → {{SYSTEM_NAME}}"
        - "[ ] Team uses Jira or equivalent? → YES/NO → {{SYSTEM_NAME}}"
        - "[ ] Team uses Miro/Figma for architecture? → YES/NO → {{SYSTEM_NAME}}"
        - "[ ] Repository is GitHub/GitLab/ADO? → YES/NO → {{SYSTEM_NAME}}"
        - "[ ] OpenAPI specs documented? → YES/NO → {{LOCATION}}"
        - "[ ] Compliance requirements exist? → YES/NO → {{FRAMEWORKS}}"
    
    step2_BuildSystemTable:
      description: "Map each discovered system with requirements"
      template:
        - system: "Confluence"
          exists: "YES"
          alreadyUsing: "YES"
          accessNeeded: "READ"
          priority: "HIGH"
        - system: "Jira"
          exists: "YES"
          alreadyUsing: "YES"
          accessNeeded: "READ"
          priority: "HIGH"
        - system: "GitHub"
          exists: "YES"
          alreadyUsing: "YES"
          accessNeeded: "READ"
          priority: "HIGH"
    
    step3_WriteRequest:
      guidance:
        - "Include only systems that exist"
        - "Adjust access levels based on sensitivity"
        - "Reference specific spaces/projects (not vague)"
        - "Emphasize read-only and minimum scope"
    
    step4_TrackAndClose:
      guidance:
        - "Update checklist as access is granted"
        - "Update team when fully ready"
        - "Don't assume approval; follow up consistently"

  proTips:
    - "Lead with security: emphasize read-only, minimum scope, 90-day rotation"
    - "Be specific: exact projects/spaces, not vague 'access'"
    - "Explain why: connect request to concrete benefit"
    - "Separate concerns: Documentation ≠ Code ≠ CI/CD"
    - "Document compliance early"
    - "Follow up systematically"

  commonGotchas:
    - "❌ Write access → ✅ Default read-only"
    - "❌ Vague scope (‘Jira access’) → ✅ Exact project (MERCHANT, read Epics/Stories)"
    - "❌ Missing PAT details → ✅ Include rotation schedule, scope, storage"
    - "❌ Forgetting API access → ✅ Mention PAT for automation"
    - "❌ Skipping compliance → ✅ Reference applicable frameworks"

  examplesByProjectType:
    - { projectType: "SaaS API", prerequisites: ["OpenAPI/Swagger", "GitHub", "Jira", "Confluence", "GitHub Actions"], timeline: "5-7 days", complexity: "MEDIUM" }
    - { projectType: "Enterprise Monorepo", prerequisites: ["Azure DevOps", "Confluence/SharePoint", "Miro", "Jira/ADO"], timeline: "10-15 days", complexity: "HIGH", notes: "Multiple approval layers" }
    - { projectType: "Microservices", prerequisites: ["Multiple repos", "API registry", "Architecture docs", "Jira+Confluence", "CI/CD"], timeline: "7-10 days", complexity: "HIGH", notes: "Cross-team coordination" }
    - { projectType: "Regulated (FinTech/Health/Gov)", prerequisites: ["All above + Security/Compliance docs + PAT rotation policy"], timeline: "15-20 days", complexity: "CRITICAL", notes: "Compliance officer sign-off required" }

  formatSelectionGuide:
    - { format: "Email", when: "Formal stakeholder engagement", time: "1-2h" }
    - { format: "Checklist", when: "Multi-phased rollout, internal tracking", time: "30-45min" }
    - { format: "Minimal", when: "Quick feedback, smaller scope", time: "10-15min" }
    - { format: "YAML (this template)", when: "CI/CD integration, automation", time: "1-2h" }


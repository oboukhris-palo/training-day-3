# AI Readiness Prerequisites - Enterprise Template

## Assessment Metadata

assessment:
  projectName: "{{ PROJECT_NAME }}"
  organizationName: "{{ ORGANIZATION_NAME }}"
  assessmentId: "{{ ASSESSMENT_ID }}"
  assessmentDate: "{{ ASSESSMENT_DATE }}"
  assessmentEndDate: "{{ ASSESSMENT_END_DATE }}"
  assessmentTeam:
    - { name: "{{ NAME }}", role: "{{ ROLE }}", email: "{{ EMAIL }}" }
  
  primaryStakeholder: { name: "{{ NAME }}", role: "{{ ROLE }}", email: "{{ EMAIL }}", phone: "{{ PHONE }}", timezone: "{{ TZ }}" }
  approver: { name: "{{ NAME }}", role: "{{ ROLE }}", email: "{{ EMAIL }}" }
  
  targetCompletionDate: "{{ TARGET_DATE }}"
  competencyLevel: "{{ ENTERPRISE | ADVANCED | STANDARD }}"

---

## Executive Summary

summary:
  readinessScore: { current: "{{ X }}%", target: "90%", assessment: "{{ TEXT }}" }
  recommendation: "{{ RECOMMENDATION_TEXT }}"
  blockers: []  # { blockerId, item, reason, severity, owner, resolutionDate }
  riskAssessment: { level: "{{ LOW | MEDIUM | HIGH | CRITICAL }}", description: "{{ TEXT }}", mitigation: "{{ TEXT }}" }

---

## Prerequisites Configuration

### 1. Documentation Systems (30% Weight)

documentation:
  confluence:
    enabled: {{ true | false }}
    accessLevel: "READ"
    spaces: [{ spaceKey: "{{ KEY }}", spaceName: "{{ NAME }}", purpose: "{{ PURPOSE }}" }]
        accessLevel: "READ"
        requestStatus: "{{ REQUESTED | GRANTED | DENIED | NOT_APPLICABLE }}"
        grantedDate: "{{ DATE }}"
        grantedBy: "{{ PERSON }}"
        notes: "{{ NOTES }}"
      
      - spaceKey: "{{ SPACE_KEY_2 }}"
        spaceName: "{{ SPACE_NAME_2 }}"
        purpose: "{{ PURPOSE }}"
        accessLevel: "READ"
        requestStatus: "{{ REQUESTED | GRANTED | DENIED | NOT_APPLICABLE }}"
    
    documentation:
      - name: "Architecture Decision Records"
        location: "{{ CONFLUENCE_SPACE }}/ADRs"
        criticality: "HIGH"
      - name: "API Specifications"
        location: "{{ CONFLUENCE_SPACE }}/API-Specs"
        criticality: "HIGH"
      - name: "Design Documentation"
        location: "{{ CONFLUENCE_SPACE }}/Design"
        criticality: "MEDIUM"
  
  # Alternative documentation systems
  alternativeDocSystems: []
    # - system: "GitBook"
    #   url: "{{ URL }}"
    #   accessLevel: "READ"
    #   requestStatus: "REQUESTED"
    #   purposeDescription: "Technical specifications and design patterns"
    # - system: "SharePoint"
    #   url: "{{ URL }}"
    #   accessLevel: "READ"
    #   requestStatus: "GRANTED"
    #   grantedDate: "{{ DATE }}"

---

### 2. Issue Tracking & Requirements (20% Readiness Weight)

issueTracking:
  
  # Jira
  jira:
    enabled: {{ true | false }}
    system: "Jira"
    accessLevel: "READ"
    rationale: "Track requirements, user stories, acceptance criteria, and implementation progress"
    
    projects:
      - projectKey: "{{ PROJECT_KEY_1 }}"
        projectName: "{{ PROJECT_NAME_1 }}"
        accessLevel: "READ"
        issueTypes:
          - "Epic"
          - "Story"
          - "Task"
          - "Bug"
        requestStatus: "{{ REQUESTED | GRANTED | DENIED | NOT_APPLICABLE }}"
        grantedDate: "{{ DATE }}"
        grantedBy: "{{ PERSON }}"
        notes: "{{ NOTES }}"
      
      - projectKey: "{{ PROJECT_KEY_2 }}"
        projectName: "{{ PROJECT_NAME_2 }}"
        accessLevel: "READ"
        requestStatus: "{{ REQUESTED | GRANTED | DENIED | NOT_APPLICABLE }}"
    
    useCase:
      - "Extract business requirements and acceptance criteria"
      - "Link code commits to story references"
      - "Validate implementation against story requirements"
      - "Track sprint progress and blockers"
  
  # Azure DevOps
  azureDevOps:
    enabled: {{ true | false }}
    system: "Azure DevOps"
    accessLevel: "READ_API"
    apiType: "PAT"
    rationale: "Programmatic access to work items, repos, and CI/CD pipelines"
    
    projects:
      - projectName: "{{ ADO_PROJECT_1 }}"
        projectId: "{{ PROJECT_ID }}"
        accessLevel: "READ_API"
        requestStatus: "{{ REQUESTED | GRANTED | DENIED | NOT_APPLICABLE }}"
        patCreatedDate: "{{ DATE }}"
        patExpireDate: "{{ DATE }}"
    
    patManagement:
      rotationSchedule: "90 days"
      nextRotationDate: "{{ DATE }}"
      scope: "minimal"
      allowedOperations:
        - "read:work_items"
        - "read:code_repository"
        - "read:build_pipeline"
  
  alternativeIssueTracking: []  # { system, project, accessLevel, requestStatus }

---

### 3. Architecture & Design Artifacts (15% Weight)

architecture:
  miro:
    enabled: {{ true | false }}
    accessLevel: "VIEWER"
    team: { teamName: "{{ NAME }}", requestStatus: "{{ STATUS }}", grantedDate: "{{ DATE }}" }
    boards: [{ boardId: "{{ ID }}", boardName: "{{ NAME }}", purpose: "{{ PURPOSE }}", criticality: "{{ HIGH|MEDIUM }}" }]
  
  figma:
    enabled: {{ true | false }}
    accessLevel: "VIEW"
    team: { teamName: "{{ NAME }}", requestStatus: "{{ STATUS }}", grantedDate: "{{ DATE }}" }
    projects: [{ projectName: "{{ NAME }}", purpose: "{{ PURPOSE }}", criticality: "{{ MEDIUM }}" }]
  
  alternativeArchitecture: []  # { system, team, accessLevel, requestStatus }

---

### 4. Code Repository & CI/CD (25% Weight)

codeRepository:
  github:
    enabled: {{ true | false }}
    accessLevel: "READ"
    repositories: [{ repoName: "{{ NAME }}", repoUrl: "{{ URL }}", requestStatus: "{{ STATUS }}", scope: ["Commits", "PRs", "Workflows"] }]
    cicdPlatform: "GitHub Actions"
  
  gitlab:
    enabled: {{ true | false }}
    accessLevel: "GUEST"
    projects: [{ projectName: "{{ NAME }}", projectId: "{{ ID }}", requestStatus: "{{ STATUS }}" }]
    cicdPlatform: "GitLab CI/CD"
  
  azureDevOpsRepo:
    enabled: {{ true | false }}
    accessLevel: "READ_API"
    patRequired: true
    repositories: [{ repoName: "{{ NAME }}", projectName: "{{ PROJECT }}", requestStatus: "{{ STATUS }}" }]
    cicdPlatform: "Azure Pipelines"
    patManagement:
      scope: "Code (read)"
      rotationSchedule: "90 days"

---

### 5. API & Integration Layer (10% Readiness Weight)

apiLayer:
  
  # OpenAPI / Swagger Registry
  apiRegistry:
    enabled: {{ true | false }}
    system: "{{ API_REGISTRY_SYSTEM }}"
    examples:
      - "Swagger Hub"
      - "Internal Registry"
      - "API Portal"
      - "Stoplight"
    
    location: "{{ REGISTRY_URL }}"
    accessLevel: "READ"
    requestStatus: "{{ REQUESTED | GRANTED | DENIED | NOT_APPLICABLE }}"
    grantedDate: "{{ DATE }}"
    
    purpose:
      - "Extract API contracts and interface specifications"
      - "Analyze integration patterns and data models"
      - "Validate API versioning and deprecation policies"
    
    documentation:
      - apiName: "{{ API_NAME_1 }}"
        apiVersion: "{{ VERSION }}"
        format: "OpenAPI 3.0"
        criticality: "HIGH"
      
      - apiName: "{{ API_NAME_2 }}"
        apiVersion: "{{ VERSION }}"
        format: "OpenAPI 3.0"
        criticality: "MEDIUM"
  
  # GraphQL Schema Registry
  graphqlRegistry:
    enabled: {{ true | false }}
    system: "GraphQL Schema Registry"
    location: "{{ REGISTRY_URL }}"
    accessLevel: "READ"
    requestStatus: "{{ REQUESTED | GRANTED | DENIED | NOT_APPLICABLE }}"
  
  # gRPC Service Definitions
  grpcServices:
    enabled: {{ true | false }}
    system: "gRPC Service Repository"
    location: "{{ REPOSITORY_LOCATION }}"
    accessLevel: "READ"
    requestStatus: "{{ REQUESTED | GRANTED | DENIED | NOT_APPLICABLE }}"

---

## Security & Compliance Framework

security:
  
  # PAT Management
  personalAccessTokens:
    rotationPolicy: "Mandatory 90-day rotation"
    firstRotation: "{{ DATE }}"
    nextScheduledRotation: "{{ DATE }}"
    
    storageSecurity:
      - "Tokens stored in isolated environment (not shared)"
      - "Tokens never logged or printed"
      - "Tokens revoked immediately after project completion"
    
    scope: "Minimum necessary privileges"
    allowedScopes:
      - read:documentation
      - read:code_repository
      - read:issues
      - read:ci_cd_pipeline
    
    prohibitedScopes:
      - write:code
      - delete:any
      - admin:organization
  
  # Data Governance
  dataGovernance:
    dataClassification: "{{ PUBLIC | INTERNAL | CONFIDENTIAL | RESTRICTED }}"
    retentionPolicy: "{{ RETENTION_PERIOD }}"
    
    complianceFrameworks:
      - "{{ FRAMEWORK_1 }}"
      - "{{ FRAMEWORK_2 }}"
      - "{{ FRAMEWORK_3 }}"
    
    certifications:
      - name: "SOC2 Type II"
        compliant: {{ true | false }}
      - name: "GDPR"
        compliant: {{ true | false }}
      - name: "HIPAA"
        compliant: {{ true | false }}
      - name: "ISO 27001"
        compliant: {{ true | false }}
  
  # Access Control & Audit
  accessControl:
    auditingEnabled: true
    auditFrequency: "Real-time"
    
    accessRules:
      - "All access is READ-ONLY unless otherwise justified"
      - "API tokens use time-limited credentials"
      - "Access is role-based and least-privileged"
      - "Regular access reviews every 90 days"
    
    complianceOfficer:
      name: "{{ COMPLIANCE_OFFICER_NAME }}"
      email: "{{ COMPLIANCE_OFFICER_EMAIL }}"
      role: "{{ ROLE }}"

---


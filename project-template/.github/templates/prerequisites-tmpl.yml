## Blockers & Escalation Management

escalation:
  
  # Active blockers
  blockers:
    - blockerId: "BLK-001"
      prerequisiteId: "PRE-003"
      system: "GitHub"
      item: "Private repository access"
      blockReason: "Security authorization pending"
      blockSeverity: "HIGH"
      currentOwner:
        name: "{{ OWNER_NAME }}"
        role: "{{ OWNER_ROLE }}"
        email: "{{ OWNER_EMAIL }}"
      createdDate: "{{ DATE }}"
      targetResolutionDate: "{{ DATE }}"
      escalationPath:
        - level: "1"
          contact: "{{ MANAGER_NAME }}"
          escalationDate: "{{ DATE }}"
        - level: "2"
          contact: "{{ DIRECTOR_NAME }}"
          escalationDate: "{{ DATE }}"
      resolutionNotes: "{{ NOTES }}"
      status: "{{ OPEN | RESOLVED }}"
  
  escalationContacts:
    - { level: "1", roleName: "{{ ROLE }}", name: "{{ NAME }}", email: "{{ EMAIL }}", phone: "{{ PHONE }}", timezone: "{{ TZ }}" }
    # Repeat for levels 2-3

